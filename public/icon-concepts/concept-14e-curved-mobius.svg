<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="RenewCanvas Africa">
  <defs>
    <linearGradient id="bg14e" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amber14e" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="url(#bg14e)"/>

  <!-- Clean curved recycling arrows using strokes with markers -->
  <g fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round">
    <!-- Arc 1: Left side going up -->
    <path d="M16,44 C6,34 10,18 24,12"/>
    <!-- Arc 2: Top going right-down -->
    <path d="M28,10 C42,8 54,20 52,36"/>
    <!-- Arc 3: Right-bottom going left -->
    <path d="M50,42 C48,54 34,58 20,50"/>
  </g>

  <!-- Arrowheads -->
  <g fill="#ffffff">
    <polygon points="24,4 34,12 22,16"/>
    <polygon points="56,38 54,52 46,42"/>
    <polygon points="16,52 10,40 22,44"/>
  </g>

  <!-- Palette -->
  <ellipse cx="32" cy="34" rx="10" ry="8" fill="#ffffff"/>

  <!-- Thumb hole -->
  <ellipse cx="26" cy="34" rx="2.5" ry="3" fill="url(#bg14e)"/>

  <!-- Paint dots -->
  <circle cx="35" cy="30" r="2" fill="url(#amber14e)"/>
  <circle cx="39" cy="35" r="1.5" fill="#8b5cf6"/>
  <circle cx="34" cy="39" r="1.5" fill="#0f766e"/>
</svg>
