<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="RenewCanvas Africa">
  <!-- Concept 4: RC Monogram with artistic flair -->
  <defs>
    <linearGradient id="tealGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amberGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Circular background -->
  <circle cx="32" cy="32" r="30" fill="url(#tealGrad4)"/>

  <!-- Letter R - stylized -->
  <path d="M18 46 L18 18 L28 18 Q34 18 34 24 Q34 30 28 30 L18 30"
        fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- R leg with artistic curve -->
  <path d="M26 30 Q32 38 34 46" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>

  <!-- Letter C - stylized as a canvas/frame corner -->
  <path d="M46 22 L40 22 Q36 22 36 26 L36 38 Q36 42 40 42 L46 42"
        fill="none" stroke="url(#amberGrad4)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Artistic dot/paint splatter -->
  <circle cx="48" cy="18" r="3" fill="url(#amberGrad4)"/>
  <circle cx="52" cy="22" r="1.5" fill="#fbbf24" opacity="0.7"/>
</svg>
