<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="RenewCanvas Africa">
  <defs>
    <linearGradient id="teal11d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amber11d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="white11d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="url(#teal11d)"/>

  <!-- Möbius recycling arrows - professional chasing arrows -->
  <g fill="url(#white11d)">
    <!-- Arrow 1: Top pointing down-right -->
    <path d="M32 4
             L40 16 L36 16
             L36 20 L48 20 L48 16
             L56 24
             L48 22 L48 24 L34 24 L34 16 L28 16
             Z"/>

    <!-- Arrow 2: Bottom-right pointing bottom-left -->
    <path d="M54 28
             L52 22 L50 26
             L46 24 L38 40 L42 42
             L32 54
             L36 44 L32 42 L42 26 L46 28 L48 24
             Z"/>

    <!-- Arrow 3: Bottom-left pointing up -->
    <path d="M10 28
             L12 22 L14 26
             L18 24 L26 40 L22 42
             L32 54
             L28 44 L32 42 L22 26 L18 28 L16 24
             Z"/>
  </g>

  <!-- Curved artist palette - proper kidney shape -->
  <path d="M23 32
           C20 28, 24 23, 31 24
           C39 25, 43 29, 42 35
           C41 41, 35 44, 28 43
           C22 42, 18 38, 20 33
           C20 31, 22 29, 23 32 Z"
        fill="#ffffff"/>

  <!-- Thumb hole -->
  <ellipse cx="26" cy="34" rx="3" ry="3.5" fill="url(#teal11d)"/>

  <!-- Paint dots -->
  <circle cx="35" cy="28" r="2.5" fill="url(#amber11d)"/>
  <circle cx="40" cy="35" r="2" fill="#8b5cf6"/>
  <circle cx="34" cy="40" r="1.8" fill="#0f766e"/>
</svg>
