<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="RenewCanvas Africa">
  <!-- Concept 6E: Mobius recycling loop around Africa -->
  <defs>
    <linearGradient id="tealGrad6e" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amberGrad6e" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Circular background -->
  <circle cx="32" cy="32" r="30" fill="url(#tealGrad6e)"/>

  <!-- Mobius-style recycling loop (continuous flow) -->
  <path d="M18 18 Q32 8 46 18 Q56 28 46 42 Q38 52 32 52 Q26 52 18 42 Q8 28 18 18 Z"
        fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-dasharray="0" opacity="0.3"/>

  <!-- Flowing arrows around -->
  <path d="M18 16 Q32 6 48 18" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
  <polygon points="46,14 52,20 46,22" fill="#ffffff"/>

  <path d="M50 24 Q56 38 46 50" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
  <polygon points="50,48 46,56 42,50" fill="#ffffff"/>

  <path d="M40 52 Q26 56 14 44" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
  <polygon points="18,48 10,46 14,40" fill="#ffffff"/>

  <path d="M12 38 Q8 24 18 14" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
  <polygon points="14,18 18,10 22,16" fill="#ffffff"/>

  <!-- Africa in center -->
  <path d="M28 20 Q33 18 36 23 L38 26 Q40 31 38 36 L40 41 Q41 47 37 50 L34 51 Q29 52 25 49 L23 45 Q19 40 21 35 L19 30 Q18 24 22 21 L26 20 Z"
        fill="url(#amberGrad6e)"/>

  <!-- Paint accent -->
  <circle cx="30" cy="34" r="2.5" fill="#8b5cf6"/>
</svg>
