<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="RenewCanvas Africa">
  <defs>
    <linearGradient id="bg16b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amber16b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="url(#bg16b)"/>

  <!-- Three curved chasing arrows -->
  <g fill="#ffffff">
    <!-- Arrow 1 body + head -->
    <path d="M14,44 C6,32 10,16 26,10 L24,18 C14,22 12,32 18,42 Z"/>
    <polygon points="30,4 42,14 28,18"/>

    <!-- Arrow 2 body + head -->
    <path d="M34,10 C50,10 58,26 54,44 L46,40 C50,28 44,18 34,16 Z"/>
    <polygon points="58,48 50,60 48,48"/>

    <!-- Arrow 3 body + head -->
    <path d="M52,52 C42,60 20,60 10,50 L16,44 C24,52 40,52 48,46 Z"/>
    <polygon points="6,46 16,36 18,48"/>
  </g>

  <!-- Palette -->
  <ellipse cx="32" cy="36" rx="12" ry="10" fill="#ffffff"/>

  <!-- Thumb hole -->
  <ellipse cx="25" cy="36" rx="3.5" ry="4" fill="url(#bg16b)"/>

  <!-- Paint dots -->
  <circle cx="36" cy="30" r="3" fill="url(#amber16b)"/>
  <circle cx="41" cy="37" r="2.5" fill="#8b5cf6"/>
  <circle cx="35" cy="43" r="2" fill="#0f766e"/>
</svg>
