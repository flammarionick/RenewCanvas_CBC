<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="RenewCanvas Africa">
  <!-- Concept 6D: Classic 3-arrow recycling with Africa + palette colors -->
  <defs>
    <linearGradient id="tealGrad6d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amberGrad6d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Circular background -->
  <circle cx="32" cy="32" r="30" fill="url(#tealGrad6d)"/>

  <!-- 3 Recycling arrows - each a different brand color -->
  <!-- Arrow 1 (top) - White -->
  <path d="M32 6 L32 16 L38 16 L32 26 L26 16 L32 16 L32 6" fill="#ffffff"/>
  <path d="M32 26 L44 20 L42 26" fill="#ffffff"/>

  <!-- Arrow 2 (bottom right) - Amber -->
  <path d="M54 42 L46 38 L48 32 L38 38 L42 46 L46 38" fill="url(#amberGrad6d)"/>
  <path d="M38 38 L32 52 L38 48" fill="url(#amberGrad6d)"/>

  <!-- Arrow 3 (bottom left) - Purple -->
  <path d="M10 42 L18 38 L16 32 L26 38 L22 46 L18 38" fill="#8b5cf6"/>
  <path d="M26 38 L20 26 L14 30" fill="#8b5cf6"/>

  <!-- Africa silhouette in center -->
  <path d="M29 24 Q33 22 35 26 L37 28 Q39 32 37 36 L39 40 Q40 44 37 47 L35 48 Q31 50 27 48 L25 45 Q22 42 23 38 L21 34 Q20 30 23 27 L27 25 Z"
        fill="#ffffff" stroke="url(#tealGrad6d)" stroke-width="1"/>
</svg>
