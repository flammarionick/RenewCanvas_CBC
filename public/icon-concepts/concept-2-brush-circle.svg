<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="RenewCanvas Africa">
  <!-- Concept 2: Paintbrush creating a circular stroke - Art + Circularity -->
  <defs>
    <linearGradient id="tealGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amberGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Circular background -->
  <circle cx="32" cy="32" r="30" fill="url(#tealGrad2)"/>

  <!-- Circular brush stroke (incomplete circle representing renewal) -->
  <path d="M32 14 A18 18 0 1 1 18 26" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>

  <!-- Paintbrush -->
  <g transform="translate(14, 18) rotate(-45)">
    <!-- Brush handle -->
    <rect x="0" y="8" width="4" height="16" rx="1" fill="url(#amberGrad2)"/>
    <!-- Brush ferrule -->
    <rect x="-1" y="6" width="6" height="4" rx="1" fill="#d97706"/>
    <!-- Brush bristles -->
    <path d="M-1 6 L2 0 L5 6 Z" fill="#ffffff"/>
  </g>

  <!-- Small paint drops -->
  <circle cx="44" cy="38" r="2" fill="url(#amberGrad2)"/>
  <circle cx="40" cy="44" r="1.5" fill="#fbbf24" opacity="0.7"/>
</svg>
