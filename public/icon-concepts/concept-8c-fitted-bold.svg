<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="RenewCanvas Africa">
  <!-- Concept 8C: Bold, solid recycling arrows, fitted palette -->
  <defs>
    <linearGradient id="tealGrad8c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amberGrad8c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Circular background -->
  <circle cx="32" cy="32" r="31" fill="url(#tealGrad8c)"/>

  <!-- Solid recycling arrows - classic triangle style, fitted -->
  <g fill="#ffffff">
    <!-- Arrow 1 - top pointing right -->
    <path d="M32 5 L44 20 L38 20 L38 28 L26 28 L26 20 L20 20 Z"/>

    <!-- Arrow 2 - bottom right pointing down-left -->
    <path d="M58 36 L52 52 L48 46 L42 50 L36 40 L44 38 L40 34 Z"/>

    <!-- Arrow 3 - bottom left pointing up -->
    <path d="M6 36 L12 20 L16 26 L22 22 L28 32 L20 34 L24 38 Z"/>
  </g>

  <!-- Palette - centered, crisp -->
  <path d="M25 28 Q22 33 26 38 Q30 42 35 40 Q40 38 41 33 Q42 28 38 25 Q34 22 30 24 Q27 26 25 28 Z"
        fill="#ffffff" stroke="#f5f5f5" stroke-width="0.5"/>

  <!-- Thumb hole -->
  <ellipse cx="29" cy="33" rx="2.5" ry="3" fill="url(#tealGrad8c)"/>

  <!-- Paint dots - larger, defined -->
  <circle cx="35" cy="28" r="2.5" fill="url(#amberGrad8c)"/>
  <circle cx="38" cy="34" r="2" fill="#8b5cf6"/>
  <circle cx="34" cy="38" r="1.5" fill="#0f766e"/>
</svg>
