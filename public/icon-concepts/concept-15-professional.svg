<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="RenewCanvas Africa">
  <defs>
    <linearGradient id="bg15" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amber15" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="url(#bg15)"/>

  <!-- Professional recycling symbol - 3 curved arrows -->
  <g transform="translate(32,32)" fill="#ffffff">
    <!-- Arrow 1 -->
    <g transform="rotate(-30)">
      <path d="M-4,-26
               C-4,-26 -12,-14 -12,-2
               L-6,-2
               C-6,-10 -4,-18 0,-22
               C4,-18 6,-10 6,-2
               L12,-2
               C12,-14 4,-26 4,-26
               L8,-26
               L0,-34
               L-8,-26
               Z"/>
    </g>
    <!-- Arrow 2 -->
    <g transform="rotate(90)">
      <path d="M-4,-26
               C-4,-26 -12,-14 -12,-2
               L-6,-2
               C-6,-10 -4,-18 0,-22
               C4,-18 6,-10 6,-2
               L12,-2
               C12,-14 4,-26 4,-26
               L8,-26
               L0,-34
               L-8,-26
               Z"/>
    </g>
    <!-- Arrow 3 -->
    <g transform="rotate(210)">
      <path d="M-4,-26
               C-4,-26 -12,-14 -12,-2
               L-6,-2
               C-6,-10 -4,-18 0,-22
               C4,-18 6,-10 6,-2
               L12,-2
               C12,-14 4,-26 4,-26
               L8,-26
               L0,-34
               L-8,-26
               Z"/>
    </g>
  </g>

  <!-- Clean oval palette -->
  <ellipse cx="32" cy="34" rx="11" ry="9" fill="#ffffff"/>

  <!-- Thumb hole -->
  <ellipse cx="26" cy="34" rx="3" ry="3.5" fill="url(#bg15)"/>

  <!-- Paint dots -->
  <circle cx="35" cy="29" r="2.5" fill="url(#amber15)"/>
  <circle cx="40" cy="35" r="2" fill="#8b5cf6"/>
  <circle cx="35" cy="40" r="2" fill="#0f766e"/>
</svg>
