<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="RenewCanvas Africa">
  <defs>
    <linearGradient id="bg14b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amber14b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="url(#bg14b)"/>

  <!-- Three curved chasing arrows -->
  <g fill="#ffffff">
    <!-- Arrow 1: Top-left curving to top, pointing right -->
    <path d="M14,20
             Q8,28 14,38
             L18,34
             Q14,28 18,22
             Z"/>
    <polygon points="18,16 28,22 18,28"/>

    <!-- Arrow 2: Top-right curving to bottom-right, pointing down-left -->
    <path d="M42,18
             Q52,26 48,38
             L44,34
             Q46,28 42,22
             Z"/>
    <polygon points="52,42 44,50 40,40"/>

    <!-- Arrow 3: Bottom curving to bottom-left, pointing up -->
    <path d="M36,50
             Q26,56 16,48
             L20,44
             Q26,50 32,46
             Z"/>
    <polygon points="12,42 20,32 24,42"/>
  </g>

  <!-- Palette -->
  <ellipse cx="32" cy="35" rx="10" ry="8" fill="#ffffff"/>

  <!-- Thumb hole -->
  <ellipse cx="26" cy="35" rx="2.5" ry="3" fill="url(#bg14b)"/>

  <!-- Paint dots -->
  <circle cx="35" cy="31" r="2" fill="url(#amber14b)"/>
  <circle cx="38" cy="36" r="1.5" fill="#8b5cf6"/>
  <circle cx="34" cy="40" r="1.5" fill="#0f766e"/>
</svg>
