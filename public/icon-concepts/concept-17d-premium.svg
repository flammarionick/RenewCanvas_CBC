<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="RenewCanvas Africa">
  <defs>
    <linearGradient id="bg17d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amber17d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="url(#bg17d)"/>

  <!-- Bold recycling arrows -->
  <g fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round">
    <path d="M10,42 A26,26 0 0,1 26,6"/>
    <path d="M34,4 A26,26 0 0,1 58,38"/>
    <path d="M54,50 A26,26 0 0,1 14,54"/>
  </g>

  <!-- Bold arrowheads -->
  <g fill="#ffffff">
    <polygon points="30,0 46,14 30,18"/>
    <polygon points="62,42 54,60 50,44"/>
    <polygon points="8,52 22,40 22,56"/>
  </g>

  <!-- Centered palette -->
  <ellipse cx="32" cy="36" rx="14" ry="12" fill="#ffffff"/>

  <!-- Thumb hole -->
  <ellipse cx="23" cy="36" rx="4.5" ry="5" fill="url(#bg17d)"/>

  <!-- Paint dots -->
  <circle cx="37" cy="28" r="3.5" fill="url(#amber17d)"/>
  <circle cx="44" cy="37" r="2.5" fill="#8b5cf6"/>
  <circle cx="37" cy="44" r="2" fill="#0f766e"/>
</svg>
