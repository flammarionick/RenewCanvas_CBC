<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="RenewCanvas Africa">
  <defs>
    <linearGradient id="bg17c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amber17c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="url(#bg17c)"/>

  <!-- Recycling symbol using clean arc segments -->
  <g fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round">
    <!-- Three arcs, each 100 degrees, with gaps for arrowheads -->
    <path d="M12,44 A24,24 0 0,1 24,8"/>
    <path d="M32,6 A24,24 0 0,1 56,40"/>
    <path d="M52,50 A24,24 0 0,1 16,52"/>
  </g>

  <!-- Arrowheads - clean triangles -->
  <g fill="#ffffff">
    <polygon points="28,2 42,12 28,16"/>
    <polygon points="60,44 54,58 48,46"/>
    <polygon points="10,50 20,40 22,54"/>
  </g>

  <!-- Palette -->
  <ellipse cx="32" cy="35" rx="13" ry="11" fill="#ffffff"/>

  <!-- Thumb hole -->
  <ellipse cx="24" cy="35" rx="4" ry="4.5" fill="url(#bg17c)"/>

  <!-- Paint dots -->
  <circle cx="36" cy="28" r="3" fill="url(#amber17c)"/>
  <circle cx="42" cy="36" r="2.5" fill="#8b5cf6"/>
  <circle cx="36" cy="42" r="2" fill="#0f766e"/>
</svg>
