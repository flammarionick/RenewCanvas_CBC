<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="RenewCanvas Africa">
  <defs>
    <linearGradient id="bg17b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amber17b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="url(#bg17b)"/>

  <!-- Clean recycling symbol -->
  <g transform="translate(32,32)" fill="#ffffff">
    <!-- Arrow template rotated 3 times -->
    <g transform="rotate(-90)">
      <path d="M-4,-6 L-4,-18 L-10,-18 L0,-28 L10,-18 L4,-18 L4,-6 A18,18 0 0,1 18,12 L12,10 A12,12 0 0,0 2,-4 L-2,-4 A12,12 0 0,0 -12,10 L-18,12 A18,18 0 0,1 -4,-6 Z"/>
    </g>
    <g transform="rotate(30)">
      <path d="M-4,-6 L-4,-18 L-10,-18 L0,-28 L10,-18 L4,-18 L4,-6 A18,18 0 0,1 18,12 L12,10 A12,12 0 0,0 2,-4 L-2,-4 A12,12 0 0,0 -12,10 L-18,12 A18,18 0 0,1 -4,-6 Z"/>
    </g>
    <g transform="rotate(150)">
      <path d="M-4,-6 L-4,-18 L-10,-18 L0,-28 L10,-18 L4,-18 L4,-6 A18,18 0 0,1 18,12 L12,10 A12,12 0 0,0 2,-4 L-2,-4 A12,12 0 0,0 -12,10 L-18,12 A18,18 0 0,1 -4,-6 Z"/>
    </g>
  </g>

  <!-- Palette -->
  <ellipse cx="32" cy="34" rx="12" ry="10" fill="#ffffff"/>

  <!-- Thumb hole -->
  <ellipse cx="25" cy="34" rx="3.5" ry="4" fill="url(#bg17b)"/>

  <!-- Paint dots -->
  <circle cx="36" cy="28" r="3" fill="url(#amber17b)"/>
  <circle cx="41" cy="35" r="2.5" fill="#8b5cf6"/>
  <circle cx="35" cy="41" r="2" fill="#0f766e"/>
</svg>
