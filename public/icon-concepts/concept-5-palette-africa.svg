<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="RenewCanvas Africa">
  <!-- Concept 5: Artist Palette with Africa-inspired shape -->
  <defs>
    <linearGradient id="tealGrad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amberGrad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Circular background -->
  <circle cx="32" cy="32" r="30" fill="url(#tealGrad5)"/>

  <!-- Stylized palette shape -->
  <path d="M20 24 Q16 32 20 42 Q24 50 34 48 Q44 46 48 38 Q52 30 48 22 Q44 14 34 16 Q24 18 20 24 Z"
        fill="#ffffff" opacity="0.95"/>

  <!-- Thumb hole -->
  <ellipse cx="26" cy="36" rx="4" ry="5" fill="url(#tealGrad5)"/>

  <!-- Paint dots representing different materials/colors -->
  <circle cx="36" cy="22" r="4" fill="url(#amberGrad5)"/>
  <circle cx="44" cy="28" r="3.5" fill="#8b5cf6"/>
  <circle cx="42" cy="38" r="3" fill="#0f766e"/>
  <circle cx="34" cy="42" r="3.5" fill="#f59e0b"/>

  <!-- Small leaf accent -->
  <path d="M46 18 Q50 14 48 10 Q46 12 46 18 Z" fill="#14b8a6"/>
</svg>
