<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="RenewCanvas Africa">
  <defs>
    <linearGradient id="teal11b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amber11b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="url(#teal11b)"/>

  <!-- Proper Möbius recycling arrows - 3 folded chasing arrows -->
  <g fill="#ffffff">
    <!-- Arrow 1: Top arrow pointing down-right -->
    <path d="M32 3 L40 15 L35 15 L35 19 L44 19 L44 15 L50 22 L44 21 L44 23 L33 23 L33 15 L28 15 Z"/>

    <!-- Arrow 2: Bottom-right arrow pointing bottom-left -->
    <path d="M55 30 L51 22 L49 27 L45 25 L40 35 L44 37 L37 44 L39 38 L35 36 L42 26 L46 28 Z"/>

    <!-- Arrow 3: Bottom-left arrow pointing up -->
    <path d="M9 30 L13 22 L15 27 L19 25 L24 35 L20 37 L27 44 L25 38 L29 36 L22 26 L18 28 Z"/>
  </g>

  <!-- Curved artist palette -->
  <path d="M23 31
           C20 28, 23 24, 29 25
           C36 26, 40 29, 39 34
           C38 39, 34 41, 28 40
           C23 39, 20 36, 21 32
           C21 30, 22 29, 23 31 Z"
        fill="#ffffff"/>

  <!-- Thumb hole -->
  <ellipse cx="26" cy="33" rx="2.5" ry="3" fill="url(#teal11b)"/>

  <!-- Paint dots -->
  <circle cx="33" cy="28" r="2" fill="url(#amber11b)"/>
  <circle cx="37" cy="33" r="1.5" fill="#8b5cf6"/>
  <circle cx="32" cy="37" r="1.5" fill="#0f766e"/>
</svg>
