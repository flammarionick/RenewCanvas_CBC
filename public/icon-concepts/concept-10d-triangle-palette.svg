<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="RenewCanvas Africa">
  <defs>
    <linearGradient id="teal10d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amber10d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="url(#teal10d)"/>

  <!-- Proper Möbius recycling triangle with 3 chasing arrows -->
  <g fill="#ffffff">
    <!-- Arrow 1 - Top, going clockwise -->
    <path d="M32 6 L36 12 L33 12 L33 18 L42 26 L38 30 L31 22 L31 12 L28 12 Z"/>

    <!-- Arrow 2 - Bottom right, going clockwise -->
    <path d="M46 32 L52 36 L48 37 L52 44 L48 52 L42 50 L46 44 L42 43 Z"/>

    <!-- Arrow 3 - Bottom left, going clockwise -->
    <path d="M18 32 L12 36 L16 37 L12 44 L16 52 L22 50 L18 44 L22 43 Z"/>
  </g>

  <!-- Connecting bands -->
  <g fill="none" stroke="#ffffff" stroke-width="5">
    <path d="M38 28 L44 36"/>
    <path d="M44 48 L20 48"/>
    <path d="M20 36 L26 28"/>
  </g>

  <!-- Realistic curved artist palette -->
  <path d="M24 29
           C22 26, 26 23, 32 24
           C40 25, 44 29, 43 35
           C42 41, 36 44, 29 43
           C23 42, 20 38, 21 33
           C21 30, 23 28, 24 29 Z"
        fill="#ffffff"/>

  <!-- Thumb hole -->
  <ellipse cx="27" cy="34" rx="3" ry="3.5" fill="url(#teal10d)"/>

  <!-- Paint dots -->
  <circle cx="35" cy="28" r="2.5" fill="url(#amber10d)"/>
  <circle cx="40" cy="35" r="2" fill="#8b5cf6"/>
  <circle cx="34" cy="40" r="1.8" fill="#0f766e"/>
</svg>
