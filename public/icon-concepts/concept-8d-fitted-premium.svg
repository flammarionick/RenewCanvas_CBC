<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="RenewCanvas Africa">
  <!-- Concept 8D: Premium, polished look -->
  <defs>
    <linearGradient id="tealGrad8d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amberGrad8d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="shadow8d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Circular background -->
  <circle cx="32" cy="32" r="31" fill="url(#tealGrad8d)"/>

  <!-- Recycling circle arrows - clean strokes -->
  <g fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round">
    <!-- Arc 1 -->
    <path d="M32 7 A25 25 0 0 1 55 38"/>
    <!-- Arc 2 -->
    <path d="M50 48 A25 25 0 0 1 14 48"/>
    <!-- Arc 3 -->
    <path d="M9 38 A25 25 0 0 1 32 7"/>
  </g>

  <!-- Arrow heads - crisp triangles -->
  <g fill="#ffffff">
    <polygon points="53,33 60,40 52,44"/>
    <polygon points="18,52 10,52 14,60"/>
    <polygon points="28,9 36,9 32,2"/>
  </g>

  <!-- Palette - premium with subtle shadow -->
  <g filter="url(#shadow8d)">
    <path d="M24 28 Q21 33 25 38 Q29 43 35 41 Q41 39 42 33 Q43 27 39 24 Q35 21 30 23 Q26 25 24 28 Z"
          fill="#ffffff"/>
  </g>

  <!-- Thumb hole -->
  <ellipse cx="28" cy="33" rx="3" ry="3.5" fill="url(#tealGrad8d)"/>

  <!-- Paint dots -->
  <circle cx="35" cy="27" r="2.5" fill="url(#amberGrad8d)"/>
  <circle cx="39" cy="33" r="2" fill="#8b5cf6"/>
  <circle cx="35" cy="38" r="2" fill="#0f766e"/>
</svg>
