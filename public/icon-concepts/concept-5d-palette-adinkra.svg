<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="RenewCanvas Africa">
  <!-- Concept 5D: Palette with Adinkra-inspired symbol (African recycling/renewal) -->
  <defs>
    <linearGradient id="tealGrad5d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amberGrad5d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Circular background -->
  <circle cx="32" cy="32" r="30" fill="url(#tealGrad5d)"/>

  <!-- Palette shape -->
  <path d="M18 26 Q14 34 18 42 Q22 50 32 48 Q42 46 46 38 Q50 30 46 22 Q42 14 32 16 Q22 18 18 26 Z"
        fill="#ffffff" opacity="0.95"/>

  <!-- Sankofa-inspired symbol in thumb hole (bird looking back = learn from past/renewal) -->
  <g transform="translate(19, 31)">
    <!-- Simplified Sankofa heart shape -->
    <path d="M5 0 Q0 0 0 5 Q0 10 5 10 Q5 7 7 5 Q5 3 5 0 Z" fill="url(#tealGrad5d)"/>
    <circle cx="6" cy="4" r="1" fill="#ffffff"/>
  </g>

  <!-- Paint dots as colorful African art -->
  <circle cx="34" cy="22" r="4" fill="url(#amberGrad5d)"/>
  <circle cx="42" cy="30" r="3.5" fill="#8b5cf6"/>
  <circle cx="38" cy="42" r="3" fill="#0f766e"/>

  <!-- Kente-inspired stripe accent -->
  <rect x="47" y="12" width="3" height="10" rx="1" fill="url(#amberGrad5d)"/>
  <rect x="51" y="14" width="2" height="8" rx="1" fill="#14b8a6"/>
</svg>
