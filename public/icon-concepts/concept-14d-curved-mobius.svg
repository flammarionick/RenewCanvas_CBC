<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="RenewCanvas Africa">
  <defs>
    <linearGradient id="bg14d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amber14d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="url(#bg14d)"/>

  <!-- Three separate curved arrows chasing each other -->
  <g fill="#ffffff">
    <!-- Arrow 1: Upper-left arc, arrowhead points to upper-right -->
    <path d="M10,34
             C10,20 20,10 34,10
             L34,16
             C24,16 16,24 16,34
             Z"/>
    <polygon points="38,6 48,14 36,18"/>

    <!-- Arrow 2: Upper-right arc, arrowhead points to bottom -->
    <path d="M40,12
             C52,16 58,28 54,42
             L48,40
             C50,30 46,22 38,18
             Z"/>
    <polygon points="56,46 52,58 46,48"/>

    <!-- Arrow 3: Bottom arc, arrowhead points to upper-left -->
    <path d="M50,48
             C44,58 28,60 16,52
             L20,46
             C28,52 40,50 44,44
             Z"/>
    <polygon points="12,50 8,38 18,42"/>

    <!-- Connecting piece from arrow 3 to arrow 1 -->
    <path d="M14,48
             C6,42 6,30 10,34
             L16,34
             C14,32 14,40 18,44
             Z"/>
  </g>

  <!-- Palette in center -->
  <ellipse cx="32" cy="36" rx="9" ry="7" fill="#ffffff"/>

  <!-- Thumb hole -->
  <ellipse cx="26" cy="36" rx="2.5" ry="3" fill="url(#bg14d)"/>

  <!-- Paint dots -->
  <circle cx="34" cy="32" r="2" fill="url(#amber14d)"/>
  <circle cx="38" cy="37" r="1.5" fill="#8b5cf6"/>
  <circle cx="33" cy="40" r="1.5" fill="#0f766e"/>
</svg>
