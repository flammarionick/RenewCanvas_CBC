<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="RenewCanvas Africa">
  <defs>
    <linearGradient id="teal9b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amber9b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="url(#teal9b)"/>

  <!-- Clean circular recycling arrows -->
  <g fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round">
    <path d="M32 6 A26 26 0 0 1 54.5 45"/>
    <path d="M54.5 45 A26 26 0 0 1 9.5 45"/>
    <path d="M9.5 45 A26 26 0 0 1 32 6"/>
  </g>

  <!-- Arrowheads - precise -->
  <polygon points="32,4 38,12 26,12" fill="#ffffff"/>
  <polygon points="56,40 56,52 46,46" fill="#ffffff"/>
  <polygon points="8,40 8,52 18,46" fill="#ffffff"/>

  <!-- Palette - clean oval -->
  <ellipse cx="32" cy="33" rx="11" ry="9" fill="#ffffff"/>

  <!-- Thumb hole -->
  <ellipse cx="27" cy="33" rx="3" ry="3.5" fill="url(#teal9b)"/>

  <!-- Paint dots - precise -->
  <circle cx="35" cy="29" r="2.2" fill="url(#amber9b)"/>
  <circle cx="39" cy="34" r="2" fill="#8b5cf6"/>
  <circle cx="35" cy="38" r="1.8" fill="#0f766e"/>
</svg>
