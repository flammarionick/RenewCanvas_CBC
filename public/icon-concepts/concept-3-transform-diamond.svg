<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="RenewCanvas Africa">
  <!-- Concept 3: Transformation - Rough material becoming polished art (diamond) -->
  <defs>
    <linearGradient id="tealGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amberGrad3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="purpleGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Circular background -->
  <circle cx="32" cy="32" r="30" fill="url(#tealGrad3)"/>

  <!-- Rough shape (waste) on left -->
  <path d="M14 32 L18 26 L22 28 L24 32 L22 36 L18 38 Z" fill="#ffffff" opacity="0.4"/>

  <!-- Transformation arrow -->
  <path d="M26 32 L36 32" stroke="url(#amberGrad3)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M33 28 L37 32 L33 36" fill="none" stroke="url(#amberGrad3)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Diamond/Gem (art) on right -->
  <path d="M44 22 L52 32 L44 46 L40 32 Z" fill="url(#purpleGrad3)"/>
  <path d="M44 22 L48 32 L44 46" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <path d="M40 32 L44 26 L48 32" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>

  <!-- Sparkle on diamond -->
  <circle cx="46" cy="28" r="1.5" fill="#ffffff"/>
</svg>
