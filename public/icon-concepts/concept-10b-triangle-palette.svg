<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="RenewCanvas Africa">
  <defs>
    <linearGradient id="teal10b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amber10b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="url(#teal10b)"/>

  <!-- Classic recycling triangle - clean version -->
  <g fill="#ffffff">
    <!-- Arrow 1: Top pointing down-right -->
    <path d="M32 4 L38 14 L34 14 L40 24 L32 20 L24 24 L30 14 L26 14 Z"/>

    <!-- Arrow 2: Bottom-right pointing left -->
    <path d="M52 50 L46 40 L50 40 L44 30 L52 34 L60 30 L54 40 L58 40 Z"/>

    <!-- Arrow 3: Bottom-left pointing up -->
    <path d="M12 50 L18 40 L14 40 L20 30 L12 34 L4 30 L10 40 L6 40 Z"/>
  </g>

  <!-- Connecting lines -->
  <g fill="none" stroke="#ffffff" stroke-width="4">
    <line x1="36" y1="22" x2="46" y2="34"/>
    <line x1="48" y1="42" x2="18" y2="42"/>
    <line x1="16" y1="34" x2="28" y2="22"/>
  </g>

  <!-- Proper curved palette -->
  <path d="M24 28
           C20 26, 22 22, 28 22
           C38 22, 44 26, 44 32
           C44 40, 38 44, 30 44
           C24 44, 20 40, 20 34
           C20 30, 22 28, 24 28 Z"
        fill="#ffffff"/>

  <!-- Thumb hole -->
  <ellipse cx="26" cy="32" rx="3" ry="4" fill="url(#teal10b)"/>

  <!-- Paint dots -->
  <circle cx="35" cy="26" r="2.5" fill="url(#amber10b)"/>
  <circle cx="40" cy="33" r="2" fill="#8b5cf6"/>
  <circle cx="34" cy="40" r="2" fill="#0f766e"/>
</svg>
