<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="RenewCanvas Africa">
  <!-- Concept 1: Canvas Frame with Leaf - Art meets Nature -->
  <defs>
    <linearGradient id="tealGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amberGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Circular background -->
  <circle cx="32" cy="32" r="30" fill="url(#tealGrad1)"/>

  <!-- Canvas/Frame shape -->
  <rect x="18" y="16" width="28" height="32" rx="2" fill="none" stroke="#ffffff" stroke-width="2.5"/>

  <!-- Inner canvas area -->
  <rect x="22" y="20" width="20" height="24" fill="rgba(255,255,255,0.15)"/>

  <!-- Leaf growing from canvas - representing art from nature -->
  <path d="M32 38 Q38 32 36 24 Q32 28 32 38 Z" fill="url(#amberGrad1)"/>
  <path d="M32 38 Q26 32 28 24 Q32 28 32 38 Z" fill="#fbbf24" opacity="0.7"/>

  <!-- Leaf stem -->
  <line x1="32" y1="38" x2="32" y2="44" stroke="url(#amberGrad1)" stroke-width="2" stroke-linecap="round"/>
</svg>
