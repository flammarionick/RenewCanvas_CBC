<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="RenewCanvas Africa">
  <defs>
    <linearGradient id="teal12" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amber12" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="url(#teal12)"/>

  <!-- Clean recycling symbol using rotation -->
  <g transform="translate(32,32)">
    <!-- Arrow 1 -->
    <g transform="rotate(0)">
      <path d="M0,-28 L6,-18 L3,-18 L3,-10 L8,-10 L8,-14 L16,-8 L8,-8 L8,-7 L-3,-7 L-3,-18 L-6,-18 Z" fill="#ffffff"/>
    </g>
    <!-- Arrow 2 -->
    <g transform="rotate(120)">
      <path d="M0,-28 L6,-18 L3,-18 L3,-10 L8,-10 L8,-14 L16,-8 L8,-8 L8,-7 L-3,-7 L-3,-18 L-6,-18 Z" fill="#ffffff"/>
    </g>
    <!-- Arrow 3 -->
    <g transform="rotate(240)">
      <path d="M0,-28 L6,-18 L3,-18 L3,-10 L8,-10 L8,-14 L16,-8 L8,-8 L8,-7 L-3,-7 L-3,-18 L-6,-18 Z" fill="#ffffff"/>
    </g>
  </g>

  <!-- Clean oval palette -->
  <ellipse cx="32" cy="34" rx="12" ry="10" fill="#ffffff"/>

  <!-- Thumb hole -->
  <ellipse cx="26" cy="34" rx="3" ry="3.5" fill="url(#teal12)"/>

  <!-- Paint dots -->
  <circle cx="35" cy="29" r="2.5" fill="url(#amber12)"/>
  <circle cx="40" cy="35" r="2" fill="#8b5cf6"/>
  <circle cx="35" cy="40" r="2" fill="#0f766e"/>
</svg>
