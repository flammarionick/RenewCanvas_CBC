<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="RenewCanvas Africa">
  <defs>
    <linearGradient id="teal9c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amber9c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="url(#teal9c)"/>

  <!-- Professional recycling symbol - 3 curved arrows -->
  <g transform="translate(32,32)" fill="#ffffff">
    <!-- Arrow 1 -->
    <path d="M0,-22 L5,-14 L2,-14 L2,-8 A14 14 0 0 1 12,4 L8,6 A10 10 0 0 0 2,-4 L2,-14 L-2,-14 L-2,-8 A10 10 0 0 0 -8,6 L-12,4 A14 14 0 0 1 -2,-8 L-2,-14 L-5,-14 Z"/>

    <!-- Arrow 2 -->
    <path d="M19,11 L14,19 L14,16 L9,19 A14 14 0 0 1 -5,22 L-4,18 A10 10 0 0 0 6,16 L9,19 L9,13 L6,16 A10 10 0 0 0 -4,18 L-5,22 A14 14 0 0 1 9,13 L14,16 L14,13 Z" transform="rotate(0)"/>
  </g>

  <!-- Simpler approach - clean arcs with chevron arrows -->
  <g fill="none" stroke="#ffffff" stroke-width="5">
    <path d="M32 5 A27 27 0 0 1 56 42" stroke-linecap="round"/>
    <path d="M56 42 A27 27 0 0 1 8 42" stroke-linecap="round"/>
    <path d="M8 42 A27 27 0 0 1 32 5" stroke-linecap="round"/>
  </g>

  <!-- Arrow chevrons -->
  <g fill="#ffffff">
    <path d="M32,2 L38,10 L32,8 L26,10 Z"/>
    <path d="M58,44 L54,52 L54,46 L48,50 Z"/>
    <path d="M6,44 L10,52 L10,46 L16,50 Z"/>
  </g>

  <!-- Palette -->
  <ellipse cx="32" cy="33" rx="12" ry="10" fill="#ffffff"/>
  <ellipse cx="26" cy="33" rx="3" ry="4" fill="url(#teal9c)"/>

  <!-- Paint dots -->
  <circle cx="35" cy="28" r="2.5" fill="url(#amber9c)"/>
  <circle cx="40" cy="34" r="2" fill="#8b5cf6"/>
  <circle cx="36" cy="39" r="2" fill="#0f766e"/>
</svg>
