<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="RenewCanvas Africa">
  <defs>
    <linearGradient id="bg13" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amber13" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="url(#bg13)"/>

  <!-- Proper Möbius recycling symbol -->
  <g fill="#ffffff" transform="translate(32,30)">
    <!-- Arrow 1: Top - bends and points down-right -->
    <path d="M-4,-24 L4,-24 L4,-14 L10,-14 L10,-18 L20,-8 L10,-8 L10,-10 L-4,-10 Z"/>

    <!-- Arrow 2: Bottom-right - bends and points bottom-left -->
    <path d="M18,4 L22,10 L14,14 L18,20 L16,24 L8,18 L10,22 L0,28 L4,18 L0,18 L8,6 Z"/>

    <!-- Arrow 3: Bottom-left - bends and points up -->
    <path d="M-18,4 L-22,10 L-14,14 L-18,20 L-16,24 L-8,18 L-10,22 L0,28 L-4,18 L0,18 L-8,6 Z"/>
  </g>

  <!-- Simple oval palette -->
  <ellipse cx="32" cy="34" rx="11" ry="9" fill="#ffffff"/>

  <!-- Thumb hole -->
  <ellipse cx="26" cy="34" rx="3" ry="3.5" fill="url(#bg13)"/>

  <!-- Paint dots -->
  <circle cx="35" cy="29" r="2.5" fill="url(#amber13)"/>
  <circle cx="39" cy="35" r="2" fill="#8b5cf6"/>
  <circle cx="34" cy="40" r="2" fill="#0f766e"/>
</svg>
