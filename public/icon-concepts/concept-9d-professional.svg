<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="RenewCanvas Africa">
  <defs>
    <linearGradient id="teal9d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amber9d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="url(#teal9d)"/>

  <!-- Clean 3-segment circular arrows -->
  <!-- Outer ring segments with gaps -->
  <path d="M32 4 A28 28 0 0 1 56.2 46" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
  <path d="M51.8 51.5 A28 28 0 0 1 12.2 51.5" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
  <path d="M7.8 46 A28 28 0 0 1 32 4" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>

  <!-- Arrowheads - clean triangles pointing in direction of flow -->
  <polygon points="32,1 39,11 25,11" fill="#ffffff"/>
  <polygon points="58.5,49 53,58 50,48" fill="#ffffff"/>
  <polygon points="5.5,49 11,58 14,48" fill="#ffffff"/>

  <!-- Palette - clean, centered -->
  <ellipse cx="32" cy="34" rx="13" ry="11" fill="#ffffff"/>

  <!-- Thumb hole -->
  <ellipse cx="25" cy="34" rx="3.5" ry="4" fill="url(#teal9d)"/>

  <!-- Paint dots - balanced -->
  <circle cx="36" cy="28" r="3" fill="url(#amber9d)"/>
  <circle cx="41" cy="35" r="2.5" fill="#8b5cf6"/>
  <circle cx="36" cy="41" r="2" fill="#0f766e"/>
</svg>
