<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="RenewCanvas Africa">
  <!-- Concept 7B: Palette with thicker, bolder recycling arrows -->
  <defs>
    <linearGradient id="tealGrad7b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amberGrad7b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Circular background -->
  <circle cx="32" cy="32" r="30" fill="url(#tealGrad7b)"/>

  <!-- Recycling arrows - thicker, more prominent -->
  <!-- Arrow 1 -->
  <path d="M18 10 A24 24 0 0 1 54 26" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
  <polygon points="51,21 58,28 50,31" fill="#ffffff"/>

  <!-- Arrow 2 -->
  <path d="M54 38 A24 24 0 0 1 28 58" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
  <polygon points="32,55 24,62 22,54" fill="#ffffff"/>

  <!-- Arrow 3 -->
  <path d="M10 34 A24 24 0 0 1 18 10" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
  <polygon points="16,14 20,6 26,12" fill="#ffffff"/>

  <!-- Artist Palette in center -->
  <path d="M22 28 Q18 34 22 40 Q26 46 34 44 Q42 42 44 36 Q46 30 44 26 Q42 22 34 24 Q26 26 22 28 Z"
        fill="#ffffff"/>

  <!-- Thumb hole -->
  <ellipse cx="28" cy="34" rx="3.5" ry="4" fill="url(#tealGrad7b)"/>

  <!-- Paint dots -->
  <circle cx="36" cy="28" r="3" fill="url(#amberGrad7b)"/>
  <circle cx="40" cy="34" r="2.5" fill="#8b5cf6"/>
  <circle cx="36" cy="40" r="2" fill="#0f766e"/>
</svg>
