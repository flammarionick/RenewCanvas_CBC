<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="RenewCanvas Africa">
  <!-- Concept 6C: Africa with circular brush stroke (art + recycling combined) -->
  <defs>
    <linearGradient id="tealGrad6c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amberGrad6c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="brushGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <!-- Circular background -->
  <circle cx="32" cy="32" r="30" fill="url(#tealGrad6c)"/>

  <!-- Circular brush stroke (recycling + art) -->
  <path d="M32 6 A26 26 0 1 1 10 22"
        fill="none" stroke="url(#brushGrad)" stroke-width="5" stroke-linecap="round"/>

  <!-- Brush stroke end (paint effect) -->
  <circle cx="10" cy="22" r="4" fill="#ffffff"/>
  <circle cx="8" cy="18" r="2" fill="#ffffff" opacity="0.6"/>

  <!-- Africa map - prominent -->
  <path d="M28 14 Q34 12 38 18 L42 22 Q46 28 44 36 L46 42 Q48 50 42 54 L38 56 Q30 58 24 54 L20 48 Q14 42 16 34 L14 28 Q12 20 18 16 L24 14 Z"
        fill="url(#amberGrad6c)" stroke="#ffffff" stroke-width="1.5"/>

  <!-- Art dots on Africa (representing creativity across continent) -->
  <circle cx="32" cy="26" r="3" fill="#8b5cf6"/>
  <circle cx="28" cy="38" r="2.5" fill="#0f766e"/>
  <circle cx="36" cy="44" r="2" fill="#ffffff" opacity="0.8"/>
</svg>
