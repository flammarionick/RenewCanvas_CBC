<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="RenewCanvas Africa">
  <defs>
    <linearGradient id="teal11a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amber11a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="url(#teal11a)"/>

  <!-- Möbius recycling symbol - 3 chasing arrows -->
  <g fill="#ffffff">
    <!-- Arrow 1: Top, pointing down-right -->
    <path d="M32 4
             L38 16
             L34 16
             L34 22
             L42 22
             L42 18
             L54 28
             L42 26
             L42 24
             L30 24
             L30 16
             L26 16
             Z"/>

    <!-- Arrow 2: Bottom-right, pointing left -->
    <path d="M52 32
             L48 26
             L48 30
             L42 30
             L38 38
             L42 38
             L32 52
             L36 40
             L40 40
             L46 32
             L46 36
             Z"/>

    <!-- Arrow 3: Bottom-left, pointing up -->
    <path d="M12 32
             L16 26
             L16 30
             L22 30
             L26 38
             L22 38
             L32 52
             L28 40
             L24 40
             L18 32
             L18 36
             Z"/>
  </g>

  <!-- Curved artist palette in center -->
  <path d="M24 30
           C21 27, 24 23, 30 24
           C38 25, 42 28, 41 34
           C40 40, 35 42, 28 41
           C22 40, 20 36, 21 32
           C21 29, 23 28, 24 30 Z"
        fill="#ffffff"/>

  <!-- Thumb hole -->
  <ellipse cx="26" cy="33" rx="2.5" ry="3" fill="url(#teal11a)"/>

  <!-- Paint dots -->
  <circle cx="34" cy="28" r="2" fill="url(#amber11a)"/>
  <circle cx="38" cy="33" r="1.5" fill="#8b5cf6"/>
  <circle cx="33" cy="38" r="1.5" fill="#0f766e"/>
</svg>
