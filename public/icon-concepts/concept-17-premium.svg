<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="RenewCanvas Africa">
  <defs>
    <linearGradient id="bg17" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amber17" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="url(#bg17)"/>

  <!-- Professional recycling symbol - using precise arcs -->
  <g transform="translate(32,32)">
    <!-- Three identical arrows rotated 120 degrees -->
    <g fill="#ffffff">
      <!-- Arrow 1 -->
      <g transform="rotate(0)">
        <path d="M-3,-8
                 A20,20 0 0,0 -18,10
                 L-14,8
                 A14,14 0 0,1 -2,-4
                 Z"/>
        <polygon points="0,-28 8,-16 -8,-16"/>
        <path d="M3,-8
                 L3,-16
                 L-3,-16
                 L-3,-8
                 A14,14 0 0,0 -14,8
                 L-18,10
                 A20,20 0 0,1 3,-8
                 Z"/>
      </g>

      <!-- Arrow 2 -->
      <g transform="rotate(120)">
        <path d="M-3,-8
                 A20,20 0 0,0 -18,10
                 L-14,8
                 A14,14 0 0,1 -2,-4
                 Z"/>
        <polygon points="0,-28 8,-16 -8,-16"/>
        <path d="M3,-8
                 L3,-16
                 L-3,-16
                 L-3,-8
                 A14,14 0 0,0 -14,8
                 L-18,10
                 A20,20 0 0,1 3,-8
                 Z"/>
      </g>

      <!-- Arrow 3 -->
      <g transform="rotate(240)">
        <path d="M-3,-8
                 A20,20 0 0,0 -18,10
                 L-14,8
                 A14,14 0 0,1 -2,-4
                 Z"/>
        <polygon points="0,-28 8,-16 -8,-16"/>
        <path d="M3,-8
                 L3,-16
                 L-3,-16
                 L-3,-8
                 A14,14 0 0,0 -14,8
                 L-18,10
                 A20,20 0 0,1 3,-8
                 Z"/>
      </g>
    </g>
  </g>

  <!-- Premium palette shape -->
  <ellipse cx="32" cy="34" rx="12" ry="10" fill="#ffffff"/>

  <!-- Thumb hole -->
  <ellipse cx="25" cy="34" rx="3.5" ry="4" fill="url(#bg17)"/>

  <!-- Paint dots -->
  <circle cx="36" cy="28" r="3" fill="url(#amber17)"/>
  <circle cx="41" cy="35" r="2.5" fill="#8b5cf6"/>
  <circle cx="35" cy="41" r="2" fill="#0f766e"/>
</svg>
