<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="RenewCanvas Africa">
  <defs>
    <linearGradient id="teal11c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amber11c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="url(#teal11c)"/>

  <!-- Classic Möbius recycling symbol with proper folded arrows -->
  <g fill="#ffffff">
    <!-- Arrow 1: Top - pointing down-right, ribbon folds -->
    <path d="M32 2 L42 18 L36 18 L36 21 L46 21 L46 17 L56 26 L46 24 L46 25 L34 25 L34 18 L28 18 Z"/>

    <!-- Arrow 2: Bottom-right - pointing left, ribbon folds -->
    <path d="M58 32 L50 20 L50 26 L47 26 L40 40 L44 40 L34 56 L38 42 L34 42 L43 28 L47 28 L47 22 Z"/>

    <!-- Arrow 3: Bottom-left - pointing up, ribbon folds -->
    <path d="M6 32 L14 20 L14 26 L17 26 L24 40 L20 40 L30 56 L26 42 L30 42 L21 28 L17 28 L17 22 Z"/>
  </g>

  <!-- Curved artist palette - centered -->
  <path d="M22 32
           C19 28, 23 24, 30 25
           C38 26, 42 30, 41 35
           C40 41, 34 43, 27 42
           C21 41, 18 37, 20 33
           C20 31, 21 30, 22 32 Z"
        fill="#ffffff"/>

  <!-- Thumb hole -->
  <ellipse cx="25" cy="34" rx="3" ry="3.5" fill="url(#teal11c)"/>

  <!-- Paint dots on palette -->
  <circle cx="34" cy="29" r="2.5" fill="url(#amber11c)"/>
  <circle cx="39" cy="35" r="2" fill="#8b5cf6"/>
  <circle cx="33" cy="39" r="1.8" fill="#0f766e"/>
</svg>
