<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="RenewCanvas Africa">
  <!-- Concept 6A: Africa map inside recycling arrows -->
  <defs>
    <linearGradient id="tealGrad6a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amberGrad6a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Circular background -->
  <circle cx="32" cy="32" r="30" fill="url(#tealGrad6a)"/>

  <!-- Recycling arrows (3 arrows in triangle) -->
  <!-- Arrow 1 - top -->
  <path d="M32 8 L40 20 L36 20 L36 28 L28 28 L28 20 L24 20 Z" fill="#ffffff"/>
  <!-- Arrow 2 - bottom right -->
  <path d="M52 44 L44 52 L44 48 L36 52 L32 44 L40 40 L40 36 Z" fill="#ffffff"/>
  <!-- Arrow 3 - bottom left -->
  <path d="M12 44 L20 36 L20 40 L28 40 L32 48 L24 52 L24 48 Z" fill="#ffffff"/>

  <!-- Africa silhouette in center -->
  <path d="M30 22 Q34 20 36 24 L38 26 Q40 30 38 34 L40 38 Q42 44 38 48 L36 50 Q32 52 28 50 L26 46 Q22 42 24 38 L22 34 Q20 28 24 24 L28 22 Z"
        fill="url(#amberGrad6a)"/>

  <!-- Small paint dot on Africa -->
  <circle cx="32" cy="36" r="2.5" fill="#8b5cf6"/>
</svg>
