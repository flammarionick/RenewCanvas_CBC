<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="RenewCanvas Africa">
  <!-- Concept 5A: Palette with recycling arrows integrated -->
  <defs>
    <linearGradient id="tealGrad5a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amberGrad5a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Circular background -->
  <circle cx="32" cy="32" r="30" fill="url(#tealGrad5a)"/>

  <!-- Stylized palette shape -->
  <path d="M18 26 Q14 34 18 42 Q22 50 32 48 Q42 46 46 38 Q50 30 46 22 Q42 14 32 16 Q22 18 18 26 Z"
        fill="#ffffff" opacity="0.95"/>

  <!-- Thumb hole with small recycling arrow circle -->
  <circle cx="24" cy="36" r="5" fill="url(#tealGrad5a)"/>
  <!-- Mini circular arrow inside thumb hole -->
  <path d="M22 34 A3 3 0 1 1 26 36" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M25.5 34.5 L26.5 36.5 L24 36" fill="#ffffff"/>

  <!-- Paint dots as upcycled materials -->
  <circle cx="34" cy="22" r="4" fill="url(#amberGrad5a)"/>
  <circle cx="42" cy="28" r="3.5" fill="#8b5cf6"/>
  <circle cx="40" cy="38" r="3" fill="#0f766e"/>

  <!-- Small leaf on palette edge -->
  <path d="M46 20 Q52 16 50 10 Q46 14 46 20 Z" fill="#14b8a6"/>
  <path d="M48 15 L46 20" stroke="#0f766e" stroke-width="1" stroke-linecap="round"/>
</svg>
