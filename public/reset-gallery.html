<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Gallery Session - RenewCanvas Africa</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #0f766e 0%, #f59e0b 100%);
        }
        .card {
            background: white;
            padding: 3rem;
            border-radius: 1rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #0f766e;
            margin: 0 0 1rem 0;
        }
        p {
            color: #666;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .btn {
            background: #0f766e;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 0.5rem;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover {
            background: #0d5c57;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(15, 118, 110, 0.4);
        }
        .success {
            color: #10b981;
            font-weight: bold;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎨 Reset Virtual Gallery</h1>
        <p>
            This will clear your gallery session and let you experience the
            <strong>outdoor museum approach</strong> with all the Polyhaven assets
            (chandelier, realistic trees, stone benches, and photorealistic textures).
        </p>
        <button class="btn" onclick="resetAndGo()">
            Reset & Visit Gallery
        </button>
        <div class="success" id="success">
            ✅ Session cleared! Redirecting...
        </div>
    </div>

    <script>
        function resetAndGo() {
            // Clear the gallery visited flag
            sessionStorage.removeItem('rc_gallery_visited');

            // Show success message
            document.getElementById('success').style.display = 'block';

            // Redirect to marketplace after short delay
            setTimeout(() => {
                window.location.href = '/marketplace';
            }, 1000);
        }
    </script>
</body>
</html>
